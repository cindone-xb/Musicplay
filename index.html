<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Spotify</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      width: 320px;
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    img {
      width: 100%;
      border-radius: 15px;
      animation: spin 6s linear infinite;
      animation-play-state: paused;
    }

    img.playing {
      animation-play-state: running;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h2 {
      margin: 10px 0;
    }

    .controls button {
      background: #22c55e;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
    }

    .time {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .playlist {
      margin-top: 15px;
      text-align: left;
    }

    .song {
      padding: 8px;
      cursor: pointer;
      border-radius: 8px;
    }

    .song:hover {
      background: rgba(255,255,255,0.1);
    }

    .active {
      background: rgba(34,197,94,0.3);
    }
  </style>
</head>
<body>

<div class="player">
  <img id="cover" src="https://i.imgur.com/8Km9tLL.jpg">
  <h2 id="title">Sweet Psycho</h2>

  <audio id="audio"></audio>

  <input type="range" id="progress" value="0">

  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button id="prev">⏮</button>
    <button id="play">▶</button>
    <button id="pause">⏸</button>
    <button id="next">⏭</button>
  </div>

  <input type="range" id="volume" min="0" max="1" step="0.01" value="1">

  <div class="playlist" id="playlist"></div>
</div>

<script>
  const songs = [
    {
      title: "Sweet Psycho",
      src: "sweet-psycho.mp3",
      cover: "https://i.imgur.com/8Km9tLL.jpg"
    }
  ];

  let currentSong = 0;

  const audio = document.getElementById('audio');
  const cover = document.getElementById('cover');
  const title = document.getElementById('title');
  const progress = document.getElementById('progress');
  const current = document.getElementById('current');
  const duration = document.getElementById('duration');
  const playlist = document.getElementById('playlist');

  function loadSong(index) {
    const song = songs[index];
    audio.src = song.src;
    title.textContent = song.title;
    cover.src = song.cover;
    highlightSong();
  }

  function playSong() {
    audio.play();
    cover.classList.add('playing');
  }

  function pauseSong() {
    audio.pause();
    cover.classList.remove('playing');
  }

  document.getElementById('play').onclick = playSong;
  document.getElementById('pause').onclick = pauseSong;

  document.getElementById('next').onclick = () => {
    currentSong = (currentSong + 1) % songs.length;
    loadSong(currentSong);
    playSong();
  };

  document.getElementById('prev').onclick = () => {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    loadSong(currentSong);
    playSong();
  };

  audio.addEventListener('timeupdate', () => {
    progress.value = (audio.currentTime / audio.duration) * 100 || 0;

    let min = Math.floor(audio.currentTime / 60);
    let sec = Math.floor(audio.currentTime % 60);
    if (sec < 10) sec = "0" + sec;
    current.textContent = `${min}:${sec}`;
  });

  audio.addEventListener('loadedmetadata', () => {
    let min = Math.floor(audio.duration / 60);
    let sec = Math.floor(audio.duration % 60);
    if (sec < 10) sec = "0" + sec;
    duration.textContent = `${min}:${sec}`;
  });

  progress.addEventListener('input', () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
  });

  document.getElementById('volume').addEventListener('input', (e) => {
    audio.volume = e.target.value;
  });

  function renderPlaylist() {
    playlist.innerHTML = '';
    songs.forEach((song, index) => {
      const div = document.createElement('div');
      div.textContent = song.title;
      div.classList.add('song');
      div.onclick = () => {
        currentSong = index;
        loadSong(index);
        playSong();
      };
      playlist.appendChild(div);
    });
  }

  function highlightSong() {
    const items = document.querySelectorAll('.song');
    items.forEach((el, i) => {
      el.classList.toggle('active', i === currentSong);
    });
  }

  loadSong(currentSong);
  renderPlaylist();
</script>

</body>
</html>
